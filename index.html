<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<title>Datalog Tool - Step Clean</title>

<script src="./libs/chart.umd.min.js"></script>
<script src="./libs/chartjs-plugin-zoom.min.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#111;
  color:#eee;
}
.container{display:flex;height:100vh;}
.left{width:400px;background:#222;padding:10px;overflow:auto;}
.right{flex:1;background:#fff;}
</style>
</head>

<body>
<div class="container">

<div class="left">
<input type="file" multiple onchange="handleFiles(this.files)">
<div id="stats"></div>
<pre id="debugBox"></pre>
<div id="ySelect"></div>
</div>

<div class="right">
<canvas id="chart"></canvas>
</div>

</div>

<script>

let FILE_DATA=[];
let chart=null;
let ALL_KEYS=[];

function hmsToSec(s){
  let p=s.split(":").map(Number);
  return p[0]*3600+p[1]*60+p[2];
}

function decode(txt){
  return txt.replace(/&lt;/g,"<").replace(/&gt;/g,">").replace(/=&gt;/g,"=>");
}
function parse(text){

  text=decode(text);

  let lines=text.split(/\n/);
  let header=null;
  let rows=[];
  let steps=[];
  let pending=null;

  for(let raw of lines){

    let line=raw.trim();
    if(!line) continue;

    if(line.startsWith("#")||line.startsWith("!")) continue;

    // ✅ STEP 抓取
    let m=line.match(/PM[_\s]*Step\s*[:=>]+\s*(.*)/i);
    if(m){
      let s=m[1].trim();
      if(s) pending=s;
      continue;
    }

    // ✅ HEADER
    if(!header && /^\s*Time/.test(line)){
      header=line.split(/\s+/);
      continue;
    }

    if(!header) continue;

    // ✅ DATA
    if(!/^\d+:\d+:\d+/.test(line)) continue;

    let p=line.split(/\s+/);
    let obj={};
    obj.t=hmsToSec(p[0]);

    // ✅ STEP去重 + 間隔過濾
    if(pending){
      let last=steps[steps.length-1];

      if(!last || last.name!==pending || (obj.t-last.t)>10){
        steps.push({t:obj.t,name:pending});
      }

      pending=null;
    }

    for(let i=1;i<header.length;i++){
      obj[header[i]]=parseFloat(p[i])||null;
    }

    rows.push(obj);
  }

  return {rows,steps,header};
}

async function handleFiles(files){

  FILE_DATA=[];
  ALL_KEYS=[];
  let debug=[];

  for(const f of files){

    let txt=await f.text();
    let p=parse(txt);

    debug.push(`${f.name} rows=${p.rows.length} steps=${p.steps.length}`);

    if(p.header){
      p.header.forEach(k=>{
        if(k!=="Time" && !ALL_KEYS.includes(k)){
          ALL_KEYS.push(k);
        }
      });
    }

    FILE_DATA.push({
      name:f.name,
      rows:p.rows,
      steps:p.steps
    });
  }

  document.getElementById("debugBox").innerText=debug.join("\n");

  let ydiv=document.getElementById("ySelect");
  ydiv.innerHTML="";

  ALL_KEYS.forEach(k=>{
    let d=document.createElement("div");
    d.innerHTML=`<input type="checkbox" value="${k}" checked onchange="draw()"> ${k}`;
    ydiv.appendChild(d);
  });

  draw();
}

function getY(){
  return [...document.querySelectorAll("#ySelect input:checked")].map(x=>x.value);
}

/* ✅ STEP文字（防重疊 + X軸下方） */
const stepTextPlugin={
  id:"stepTextPlugin",
  afterDraw(chart,args,opt){

    let steps=opt.steps;
    if(!steps?.length) return;

    let {ctx,chartArea,scales}=chart;
    let x=scales.x;

    let yPos = chartArea.bottom + 20;

    ctx.save();
    ctx.fillStyle="#000";
    ctx.font="10px Arial";
    ctx.textAlign="center";

    const MIN_GAP=70;   // ✅ 間距控制
    let lastX=-9999;

    for(let s of steps){

      let px=x.getPixelForValue(s.x);

      if(px<chartArea.left||px>chartArea.right) continue;

      if(Math.abs(px-lastX)<MIN_GAP) continue;

      ctx.fillText(s.name,px,yPos);
      lastX=px;
    }

    ctx.restore();
  }
};

function draw(){

  if(!FILE_DATA.length) return;

  let keys=getY();
  let datasets=[];
  let colors=["red","blue","green","orange"];

  let file=FILE_DATA[0];

  let steps=file.steps.map(s=>({x:s.t,name:s.name}));

  FILE_DATA.forEach((f,i)=>{

    let key=keys[0];

    let data=f.rows.map(r=>({
      x:r.t,
      y:r[key]
    }));

    datasets.push({
      label:f.name,
      data:data,
      parsing:false,
      borderColor:colors[i%colors.length],
      pointRadius:0
    });

  });

  if(chart) chart.destroy();

  chart=new Chart(document.getElementById("chart"),{

    type:"line",
    data:{datasets},

    plugins:[stepTextPlugin],

    options:{
      responsive:true,

      layout:{
        padding:{bottom:40}   // ✅ STEP空間
      },

      scales:{
        x:{type:"linear"},
        y:{type:"linear"}
      },

      plugins:{
        stepTextPlugin:{steps:steps},

        zoom:{
          pan:{enabled:true,mode:"x"},
          zoom:{
            wheel:{enabled:true},
            drag:{
              enabled:true,
              backgroundColor:'rgba(0,0,0,0.1)',
              borderColor:'rgba(0,0,0,0.4)',
              borderWidth:1
            },
            mode:"x"
          }
        }
      }
    }
  });
}
</script>
</body>
</html>
