<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Datalog Overlay Tool</title>

<script src="./libs/chart.umd.min.js"></script>
<script src="./libs/chartjs-plugin-zoom.min.js"></script>

<style>
body{margin:0;font-family:Arial;background:#111;color:#eee;}
.container{display:flex;height:100vh;gap:10px;padding:10px;}
.left{width:420px;background:#222;padding:10px;overflow:auto;}
.right{flex:1;}
.row{display:flex;gap:8px;margin:6px 0;}
.chartWrap{height:80vh;background:#fff;}
</style>
</head>

<body>
<div class="container">

<div class="left">
<input type="file" multiple onchange="handleFiles(this.files)">

<div class="row">
<label>X 模式</label>
<select id="xMode">
<option value="align">align</option>
<option value="absolute">absolute</option>
<option value="relative">relative</option>
</select>
</div>

<div class="row">
<input type="checkbox" id="showSteps" checked>
顯示 STEP
</div>

<button onclick="draw()">重畫</button>

<div id="debugBox"></div>

</div>

<div class="right">
<div class="chartWrap">
<canvas id="chart"></canvas>
</div>
</div>

</div>

<script>
let FILE_DATA=[];
let chart=null;

function hmsFlexibleToSec(hms){
  const p=hms.split(":").map(Number);
  return (p[0]||0)*3600+(p[1]||0)*60+(p[2]||0);
}

function secToHMS(sec){
  const h=Math.floor(sec/3600);
  const m=Math.floor(sec%3600/60);
  const s=sec%60;
  return `${h}:${m}:${s}`;
}

function secDiff(base,target){
  let d=hmsFlexibleToSec(target)-hmsFlexibleToSec(base);
  if(d<0)d+=86400;
  return d;
}

function parseDatalogStable(text){

  const lines=text.split(/\r?\n/);
  let header=null;
  const rows=[];
  const steps=[];

  const startMatch=text.match(/Start.*(\d{1,2}:\d{1,2}:\d{1,2})/);
  const baseStart=startMatch?startMatch[1]:null;

  let pendingStep=null;

  for(const raw of lines){

    const line=raw.trim();
    if(!line)continue;

    // START STEP
    const s1=raw.match(/START.*?(\d{1,2}:\d{1,2}:\d{1,2}).*?PM_Step\s*=>\s*(.+)/i);
    if(s1 && baseStart){
      const t=secDiff(baseStart,s1[1]);
      const name=s1[2].trim();
      if(!steps.length||steps[steps.length-1].name!==name){
        steps.push({t,name});
      }
      continue;
    }

    // EVENT STEP
    const s2=raw.match(/EVENT.*PM_Step\s*=>\s*(.+)/i);
    if(s2){
      pendingStep=s2[1].trim();
      continue;
    }

    // DATA ROW
    if(/^\d{1,2}:\d{1,2}:\d{1,2}/.test(line)){

      const parts=line.split(/\s+/);
      if(!parts.length)continue;

      const obj={};
      obj.Time=parts[0];
      obj.Time_s=hmsFlexibleToSec(parts[0]);

      if(pendingStep){
        if(!steps.length||steps[steps.length-1].name!==pendingStep){
          steps.push({t:obj.Time_s,name:pendingStep});
        }
        pendingStep=null;
      }

      for(let i=1;i<parts.length;i++){
        obj["col"+i]=parseFloat(parts[i]);
      }

      rows.push(obj);
    }
  }

  return {rows,steps};
}<script>

/* =========================
   Step Overlay Plugin
========================= */
const stepOverlayPlugin = {
  id: 'stepOverlayPlugin',
  afterDraw(chart, args, opts){

    if(!opts.enabled) return;
    const steps = opts.steps || [];
    if(!steps.length) return;

    const {ctx, chartArea, scales} = chart;
    const xScale = scales.x;

    ctx.save();
    ctx.strokeStyle = "#666";
    ctx.fillStyle = "#222";
    ctx.font = "12px Arial";
    ctx.textAlign = "center";

    steps.forEach((s,i)=>{
      const x = xScale.getPixelForValue(s.x);

      // 垂直線
      ctx.beginPath();
      ctx.moveTo(x, chartArea.top);
      ctx.lineTo(x, chartArea.bottom);
      ctx.stroke();

      // label
      const next = steps[i+1]?.x ?? xScale.max;
      const mid = (x + xScale.getPixelForValue(next)) / 2;

      ctx.fillText(s.name, mid, chartArea.top + 5);
    });

    ctx.restore();
  }
};

/* =========================
   Draw chart
========================= */
function draw(){

  const files = FILE_DATA;
  if(!files.length) return;

  const datasets = [];

  // ✅ 先算 step（關鍵）
  let overlaySteps = [];

  const ref = files[0];
  if(ref.steps && ref.steps.length){
    overlaySteps = ref.steps.map(s => ({
      x: s.t,
      name: s.name
    }));
  }

  // ✅ 畫數據
  files.forEach(f=>{
    f.rows.forEach(r=>{
      // 只畫一條 BG Pressure 當示範
      if(r.col2 !== undefined){
        datasets.push({
          label: f.name,
          data: f.rows.map(x=>({x:x.Time_s,y:x.col2})),
          borderColor: "#ff3b30",
          borderWidth:2,
          pointRadius:0
        });
      }
    });
  });

  if(chart) chart.destroy();

  chart = new Chart(document.getElementById("chart"),{
    type:"line",
    data:{datasets},
    plugins:[stepOverlayPlugin],
    options:{
      responsive:true,

      scales:{
        x:{
          type:"linear",
          ticks:{
            callback:(v)=>secToHMS(v)
          }
        }
      },

      plugins:{
        stepOverlayPlugin:{
          enabled: document.getElementById("showSteps").checked,
          steps: overlaySteps
        }
      }
    }
  });
}

/* =========================
   File loader
========================= */
async function handleFiles(fileList){

  FILE_DATA = [];

  for(const f of fileList){

    const text = await f.text();
    const res = parseDatalogStable(text);

    FILE_DATA.push({
      name: f.name,
      rows: res.rows,
      steps: res.steps
    });

    console.log("steps=", res.steps);
  }

  draw();
}

</script>
