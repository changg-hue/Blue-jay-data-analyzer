<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Datalog Overlay Tool (Clean Step Band)</title>

<script src="./libs/chart.umd.min.js"></script>
<script src="./libs/chartjs-plugin-zoom.min.js"></script>

<style>
:root{
  --bg:#111;
  --panel:#222;
  --border:#444;
  --text:#eee;
}

body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:Arial;
}

.container{
  display:flex;
  height:100vh;
  gap:10px;
  padding:10px;
}

.left{
  width:420px;
  background:var(--panel);
  padding:10px;
  border-radius:10px;
  overflow:auto;
}

.right{
  flex:1;
}

.row{
  display:flex;
  gap:6px;
  margin:6px 0;
  flex-wrap:wrap;
}

input,select,button{
  background:#111;
  color:#eee;
  border:1px solid #444;
  border-radius:6px;
  padding:5px;
}

#chart{
  width:100%;
  height:100%;
}

.chartWrap{
  height:100%;
  background:#fff;
  border-radius:10px;
  position:relative;
}

#cursorBox{
  position:absolute;
  right:10px;
  top:10px;
  background:#000;
  color:#fff;
  font-size:12px;
  padding:6px;
}
</style>
</head>

<body>
<div class="container">

<div class="left">

<input type="file" multiple onchange="handleFiles(this.files)">

<div class="row">
<select id="xMode" onchange="draw()">
<option value="align">align</option>
<option value="absolute">absolute</option>
</select>
</div>

<div class="row">
<label><input type="checkbox" id="showStepBands" checked onchange="draw()">step區塊</label>
<label><input type="checkbox" id="showSteps" checked onchange="draw()">step文字</label>
</div>

<div id="debugBox"></div>

</div>

<div class="right">
<div class="chartWrap">
<canvas id="chart"></canvas>
<div id="cursorBox">Move mouse</div>
</div>
</div>

</div>

<script>

let FILE_DATA=[];
let chart=null;

function parseStartEpoch(text){
  const m=text.match(/Start\s*:\s*(\d+\/\d+\/\d+)\s+(\d+:\d+:\d+)/);
  if(!m) return null;
  return new Date(m[1]+" "+m[2]).getTime()/1000;
}

function hmsToSec(s){
  let p=s.split(":");
  return p[0]*3600+p[1]*60+p[2]*1;
}

function parse(text){
  let lines=text.split(/\n/);
  let header=null;
  let rows=[];
  let steps=[];
  let pending=null;

  for(let raw of lines){
    let line=raw.trim();

    // ✅ 最強 Step parser（重點）
    let stepMatch=line.match(/PM_Step\s*[:=>]+\s*(.+)$/i);
    if(stepMatch){
      pending=stepMatch[1].trim();
    }

    if(!header && /^Time/.test(line)){
      header=line.split(/\s+/);
      continue;
    }

    if(!header) continue;
    if(!/^\d{1,2}:\d{1,2}:\d{1,2}/.test(line)) continue;

    let parts=line.split(/\s+/);
    let obj={};
    obj.t=hmsToSec(parts[0]);

    if(pending){
      steps.push({t:obj.t,name:pending});
      pending=null;
    }

    for(let i=1;i<header.length;i++){
      obj[header[i]]=parseFloat(parts[i])||null;
    }

    rows.push(obj);
  }

  return {rows,steps};
}
function handleFiles(files){

  FILE_DATA=[];
  let debug=[];

  for(let f of files){

    let reader=new FileReader();

    reader.onload=e=>{
      let txt=e.target.result;

      let parsed=parse(txt);
      let start=parseStartEpoch(txt);

      FILE_DATA.push({
        name:f.name,
        rows:parsed.rows,
        steps:parsed.steps,
        start:start,
        enabled:true
      });

      debug.push(`${f.name} rows=${parsed.rows.length} steps=${parsed.steps.length}`);

      document.getElementById("debugBox").innerText=debug.join("\n");

      draw();
    }

    reader.readAsText(f);
  }
}

function draw(){

if(!FILE_DATA.length) return;

let datasets=[];
let colors=["red","blue","green","orange"];

let steps=[];

let f=FILE_DATA[0];
if(f.steps){
steps=f.steps.map(s=>({x:s.t,name:s.name}));
}

for(let i=0;i<FILE_DATA.length;i++){

  let file=FILE_DATA[i];

  let data=file.rows.map(r=>({x:r.t,y:r.Chamber_Flow||0}));

  datasets.push({
    label:file.name,
    data:data,
    parsing:false,
    borderColor:colors[i%colors.length],
    pointRadius:0
  });
}

if(chart) chart.destroy();

chart=new Chart(chartCanvas(),{
type:"line",
data:{datasets},
plugins:[stepBandPlugin,stepOverlayPlugin],
options:{
responsive:true,
scales:{
x:{type:"linear"},
y:{type:"linear"}
},
plugins:{
stepBandPlugin:{
enabled:document.getElementById("showStepBands").checked,
steps:steps
},
stepOverlayPlugin:{
enabled:document.getElementById("showSteps").checked,
steps:steps
}
}
}
});
}

/* ✅ step 區塊 */
const stepBandPlugin={
id:"stepBandPlugin",
beforeDatasetsDraw(chart,args,opt){

if(!opt.enabled) return;

let {ctx,chartArea,scales}=chart;
let x=scales.x;
let steps=opt.steps;

ctx.save();

for(let i=0;i<steps.length;i++){
let s=steps[i];
let next=steps[i+1];

let x1=x.getPixelForValue(s.x);
let x2=next?x.getPixelForValue(next.x):chartArea.right;

ctx.fillStyle=`rgba(${(i*50)%255},150,200,0.15)`;
ctx.fillRect(x1,chartArea.top,x2-x1,chartArea.bottom-chartArea.top);
}

ctx.restore();
}
};

/* ✅ step 文字 */
const stepOverlayPlugin={
id:"stepOverlayPlugin",
afterDraw(chart,args,opt){

if(!opt.enabled) return;

let {ctx,chartArea,scales}=chart;
let x=scales.x;

ctx.save();
ctx.fillStyle="#000";
ctx.textAlign="center";

for(let i=0;i<opt.steps.length;i++){

let s=opt.steps[i];
let next=opt.steps[i+1];

let x1=x.getPixelForValue(s.x);
let x2=next?x.getPixelForValue(next.x):chartArea.right;

ctx.fillText(s.name,(x1+x2)/2,chartArea.top+4);
}

ctx.restore();
}
};

function chartCanvas(){
return document.getElementById("chart");
}
</script>

</body>
</html>
