<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Datalog Tool - Clean Step Text Only</title>

<script src="./libs/chart.umd.min.js"></script>
<script src="./libs/chartjs-plugin-zoom.min.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#111;
  color:#eee;
}

.container{
  display:flex;
  height:100vh;
}

.left{
  width:420px;
  background:#222;
  padding:10px;
  overflow:auto;
}

.right{
  flex:1;
  background:#fff;
}

#chart{
  width:100%;
  height:100%;
}

.row{margin:6px 0;}
input,select{width:100%;}
</style>
</head>

<body>

<div class="container">

<div class="left">

<input type="file" multiple onchange="handleFiles(this.files)">

<div id="stats">Files=0</div>
<pre id="debugBox"></pre>

<div class="row">
<select id="xMode" onchange="draw()">
<option value="align">align</option>
<option value="absolute">absolute</option>
</select>
</div>

<div id="ySelect"></div>

</div>

<div class="right">
<canvas id="chart"></canvas>
</div>

</div>

<script>

let FILE_DATA=[];
let chart=null;
let ALL_KEYS=[];

function hmsToSec(s){
  let p=s.split(":").map(Number);
  return p[0]*3600+p[1]*60+p[2];
}

function parseStartEpoch(txt){
  let m=txt.match(/Start\s*:\s*(\d+\/\d+\/\d+)\s+(\d+:\d+:\d+)/);
  if(!m) return null;
  return new Date(m[1]+" "+m[2]).getTime()/1000;
}
``
function decode(text){
  return text.replace(/&lt;/g,"<").replace(/&gt;/g,">").replace(/=&gt;/g,"=>");
}

function parse(text){

  text=decode(text);

  let lines=text.split(/\n/);

  let header=null;
  let rows=[];
  let steps=[];
  let pending=null;

  for(let raw of lines){

    let line=raw.trim();
    if(!line) continue;

    if(line.startsWith("#")||line.startsWith("!")) continue;

    // ✅ Step
    let m=line.match(/PM[_\s]*Step\s*[:=>]+\s*(.*)/i);
    if(m){
      let s=m[1].trim();
      if(s) pending=s;
      continue;
    }

    // ✅ Header
    if(!header && /^\s*Time/.test(line)){
      header=line.split(/\s+/);
      continue;
    }

    if(!header) continue;

    // ✅ Data row
    if(!/^\d+:\d+:\d+/.test(line)) continue;

    let p=line.split(/\s+/);
    let obj={};
    obj.t=hmsToSec(p[0]);

    if(pending){
      let last=steps[steps.length-1];
      if(!last || last.name!==pending){
        steps.push({t:obj.t,name:pending});
      }
      pending=null;
    }

    for(let i=1;i<header.length;i++){
      obj[header[i]]=parseFloat(p[i])||null;
    }

    rows.push(obj);
  }

  return {rows,steps,header};
}

function handleFiles(files){

  FILE_DATA=[];
  ALL_KEYS=[];
  let debug=[];

  (async()=>{

    for(let f of files){

      let txt=await f.text();
      let p=parse(txt);

      let start=parseStartEpoch(txt);

      debug.push(`${f.name} rows=${p.rows.length} steps=${p.steps.length}`);

      if(p.header){
        p.header.forEach(k=>{
          if(k!=="Time" && !ALL_KEYS.includes(k)){
            ALL_KEYS.push(k);
          }
        });
      }

      FILE_DATA.push({
        name:f.name,
        rows:p.rows,
        steps:p.steps,
        start:start,
        enabled:true
      });
    }

    document.getElementById("debugBox").innerText=debug.join("\n");

    buildY();
    draw();

  })();
}

function buildY(){

  let el=document.getElementById("ySelect");
  el.innerHTML="";

  ALL_KEYS.forEach(k=>{
    let d=document.createElement("div");
    d.innerHTML=`<input type="checkbox" value="${k}" checked onchange="draw()"> ${k}`;
    el.appendChild(d);
  });
}

function getY(){
  return [...document.querySelectorAll("#ySelect input:checked")].map(x=>x.value);
}

/* ✅ Step文字 ONLY（不畫線、不畫色塊） */
const stepTextPlugin={
  id:"stepTextPlugin",
  afterDraw(chart,args,opt){

    let steps=opt.steps;
    if(!steps?.length) return;

    let {ctx,chartArea,scales}=chart;
    let x=scales.x;

    ctx.save();
    ctx.fillStyle="#000";
    ctx.textAlign="center";
    ctx.font="bold 12px Arial";

    for(let i=0;i<steps.length;i++){

      let s=steps[i];
      let next=steps[i+1];

      let x1=x.getPixelForValue(s.x);
      let x2=next?x.getPixelForValue(next.x):chartArea.right;

      let mid=(x1+x2)/2;

      if(mid>=chartArea.left && mid<=chartArea.right){
        ctx.fillText(s.name,mid,chartArea.top+4);
      }
    }

    ctx.restore();
  }
};

function draw(){

  if(!FILE_DATA.length) return;

  let datasets=[];
  let ykeys=getY();
  let colors=["red","blue","green","orange"];

  let file=FILE_DATA[0];

  let steps=file.steps.map(s=>({x:s.t,name:s.name}));

  FILE_DATA.forEach((f,i)=>{

    let key=ykeys[0];

    let data=f.rows.map(r=>({
      x:r.t,
      y:r[key]
    }));

    datasets.push({
      label:f.name+" | "+key,
      data:data,
      parsing:false,
      borderColor:colors[i%colors.length],
      pointRadius:0
    });

  });

  if(chart) chart.destroy();

  chart=new Chart(document.getElementById("chart"),{

    type:"line",

    data:{datasets},

    plugins:[stepTextPlugin],

    options:{
      responsive:true,
      scales:{
        x:{type:"linear"},
        y:{type:"linear"}
      },

      plugins:{
        stepTextPlugin:{steps:steps},

        zoom:{
          pan:{enabled:true,mode:"x"},
          zoom:{
            wheel:{enabled:true},
            drag:{
              enabled:true,
              backgroundColor:'rgba(0,0,0,0.1)',
              borderColor:'rgba(0,0,0,0.4)',
              borderWidth:1
            },
            mode:"x"
          }
        }
      }
    }
  });
}

</script>
</body>
</html>
